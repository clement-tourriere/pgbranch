# Example configuration for Neon backend
backend:
  type: neon
  neon:
    api_key: ${NEON_API_KEY}      # Set this environment variable with your Neon API key
    project_id: ${NEON_PROJECT_ID} # Set this environment variable with your project ID
    base_url: https://console.neon.tech/api/v2  # Optional, defaults to this value

# Git configuration
git:
  auto_create_on_branch: true
  branch_filter_regex: null
  exclude_branches:
    - main
    - master

# Behavior configuration
behavior:
  auto_cleanup: false
  max_branches: 10
  naming_strategy: prefix

# Post-commands work identically across all backends
# Template variables will be populated with the appropriate connection info
post_commands:
  - echo 'DATABASE_URL=postgresql://{db_user}@{db_host}:{db_port}/{db_name}' >> .env
  - name: Run database migrations
    command: echo 'Would run: npm run migrate'
    condition: never
    continue_on_error: true
  - echo 'Neon database {db_name} ready for branch {branch_name}!'